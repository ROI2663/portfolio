<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>未来を切り開く、君のためのポートフォリオ</title>
    <style>
      :root {
        --bg: #081a3a;
        --card: #0f2b57;
        --text: #ffffff;
        --muted: #cdd8ee;
        --accent: #9dc2ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic UI",
          sans-serif;
        color: var(--text);
        background: linear-gradient(145deg, #06122a, var(--bg));
      }

      .page {
        width: min(92vw, 520px);
      }

      .card {
        width: 100%;
        background: var(--card);
        border-radius: 18px;
        padding: 28px;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
      }

      header {
        display: flex;
        align-items: center;
        gap: 16px;
        margin: -28px -28px 18px;
        padding: 28px;
        background-color: #1e3a5f;
        border-radius: 18px 18px 0 0;
      }

      .avatar {
        width: 84px;
        height: 84px;
        border-radius: 50%;
        border: 3px solid rgba(255, 255, 255, 0.85);
        object-fit: cover;
      }

      h1 {
        margin: 0;
        font-size: 1.75rem;
        letter-spacing: 0.03em;
      }

      .item {
        margin: 10px 0;
        font-size: 1.05rem;
      }

      .label {
        display: inline-block;
        min-width: 84px;
        color: var(--muted);
      }

      .comment {
        margin-top: 20px;
        padding-top: 16px;
        border-top: 1px solid rgba(255, 255, 255, 0.2);
        line-height: 1.7;
      }

      .highlight {
        color: var(--accent);
        font-weight: 600;
      }

      footer {
        margin-top: 14px;
        text-align: center;
        font-size: 0.88rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="page">
      <main class="card">
        <header>
          <img
            class="avatar"
            src="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Crect width='200' height='200' fill='%233b82f6'/%3E%3Ctext x='100' y='114' text-anchor='middle' fill='white' font-size='72' font-family='Arial'%3ETM%3C/text%3E%3C/svg%3E"
            alt="プロフィール画像"
          />
          <h1>自己紹介ページ</h1>
        </header>

        <p class="item"><span class="label">名前：</span>鳥居幹広</p>
        <p class="item"><span class="label">趣味：</span>生成AI勉強</p>
        

        <p class="comment">
          <span class="label">一言：</span>
          生成AIを楽しく学びながら、<span class="highlight">日々アップデート</span>
          しています。
        </p>
      </main>
      <footer>&copy; 2026 鳥居幹広. All Rights Reserved.</footer>
    </div>
  </body>
</html>
